<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TravelBloom</title>
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>

<header class="navbar">
  <div class="logo">✈ TravelBloom</div>

  <nav>
    <a href="#">Home</a>
    <a href="#">About Us</a>
    <a href="#">Contact Us</a>
  </nav>

  <div class="search-box">
    <div class="input-wrapper">
        <input type="text" id="searchInput" placeholder="Enter a destination (e.g, US, Canada, India)">
    </div>
    <button onclick="search()">Search</button>
    <button onclick="clearInput()">Clear</button>
  </div>
</header>

<section class="hero">
  <div class="overlay"></div>

  <div class="content">
    <h1>
      EXPLORE <br>
      DREAM <br>
      DESTINATION
    </h1>

    <p>
      It encourages exploration of unfamiliar territories, embracing diverse cultures and landscapes while pursuing your dream destination.
    </p>

    <button class="btn">BOOK NOW</button>
  </div>

  <div class="social">
    <span>🐦</span>
    <span>📘</span>
    <span>📸</span>
    <span>▶</span>
  </div>
   
</section>
<div class="show-search-wrapper">
     <div id="resultContainer" class="results"></div>
</div>  

<script src="./Javascrip/js.js"></script>
</body>
</html>
